server:
  port: 8083

admin:
  username: ${ADMIN_USERNAME}
  password: ${ADMIN_PASSWORD}

jwt:
  secret: ${JWT_SECRET}

spring:
  application:
    name: blog-backend
  datasource:
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.planb: debug

# LangChain4j - DeepSeek Chat Model
langchain4j:
  open-ai:
    chat-model:
      api-key: ${DEEPSEEK_API_KEY:sk-placeholder}
      base-url: https://api.deepseek.com
      model-name: deepseek-chat
      temperature: 0.7
      max-tokens: 2000
    streaming-chat-model:
      api-key: ${DEEPSEEK_API_KEY:sk-placeholder}
      base-url: https://api.deepseek.com
      model-name: deepseek-chat
      temperature: 0.7
      max-tokens: 2000

# 聊天机器人配置
chat:
  bot:
    system-prompt: >
      你是 PlanB's Blog 的 AI 助手。你的任务是基于博客文章内容回答用户的技术问题。
      请用中文回答，保持专业和友好。如果问题与博客内容无关，请礼貌地引导用户回到博客相关话题。
      回答时如果引用了某篇文章，请提及文章标题。
    max-retrieved-docs: 3
    min-relevance-score: 0.5
